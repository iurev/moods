  - id: mood_guilty
    definitions:
      - "Feeling bad because you think you did something wrong."
      - "Guilt often brings a wish to apologize, repair the damage, or do better next time."
    example: "I felt guilty after I lied to my friend."
  - id: mood_happy
    definitions:
      - "Feeling good, light, and pleased with what is happening."
      - "Happy can be quiet and peaceful or active and excited."
    example: "They felt happy when the good news finally arrived."
