<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>moods</title>
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex,max-image-preview:none,max-snippet:0,max-video-preview:0">
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex,max-image-preview:none,max-snippet:0,max-video-preview:0">
<meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet,noimageindex,max-image-preview:none,max-snippet:0,max-video-preview:0">
<meta name="application-name" content="moods">
<meta name="apple-mobile-web-app-title" content="moods">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffd04b">
<meta name="msapplication-TileColor" content="#ffd04b">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<style>
:root{
  --bg:#f7f1df;
  --surface:#fffdf7;
  --surface-strong:#fff7dc;
  --border:#ddcfad;
  --text:#2c2417;
  --muted:#6c614d;
  --accent:#f2b632;
  --accent-strong:#a85f00;
  --shadow:0 14px 32px rgba(97,63,0,.10);
}

*{box-sizing:border-box}

html{color-scheme:light}

body{
  margin:0;
  font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,.75), transparent 32rem),
    linear-gradient(180deg, #fbf7ec 0%, var(--bg) 100%);
  color:var(--text);
}

a{color:inherit}

button,
input{
  font:inherit;
}

.page{
  max-width:1280px;
  margin:0 auto;
  padding:32px 24px 48px;
}

.hero{
  display:grid;
  gap:18px;
  margin-bottom:28px;
}

.hero h1{
  margin:0;
  font-size:clamp(2rem, 2vw + 1.4rem, 3.2rem);
  line-height:1;
}

.hero p{
  margin:0;
  max-width:44rem;
  line-height:1.6;
  color:var(--muted);
}

.toolbar{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:14px;
  align-items:center;
}

.search-field input{
  width:100%;
  min-height:56px;
  padding:0 18px;
  border:1px solid var(--border);
  border-radius:18px;
  background:rgba(255,255,255,.76);
  box-shadow:var(--shadow);
}

.search-field input:focus-visible,
.ghost-button:focus-visible,
.copy-button:focus-visible,
.favorite-button:focus-visible,
.favorite-toggle input:focus-visible{
  outline:3px solid #2d6cdf;
  outline-offset:2px;
}

.favorite-toggle{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-height:56px;
  padding:0 16px;
  border:1px solid var(--border);
  border-radius:18px;
  background:rgba(255,255,255,.76);
  box-shadow:var(--shadow);
  color:var(--muted);
}

.favorite-toggle input{
  width:18px;
  height:18px;
  accent-color:var(--accent-strong);
}

.summary-bar{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  justify-content:space-between;
}

.summary-text{
  color:var(--muted);
  font-size:.96rem;
}

.ghost-button{
  min-height:42px;
  padding:10px 14px;
  border:1px solid var(--border);
  border-radius:999px;
  background:transparent;
  color:var(--text);
  cursor:pointer;
}

.message{
  padding:20px 22px;
  border:1px solid var(--border);
  border-radius:20px;
  background:rgba(255,255,255,.72);
  color:var(--muted);
  box-shadow:var(--shadow);
}

.message.error{
  border-color:#d4b0a6;
  color:#7c3d2b;
  background:#fff0eb;
}

.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
}

.card{
  display:grid;
  grid-template-columns:minmax(220px,280px) minmax(0,1fr);
  align-items:start;
  min-height:100%;
  border:1px solid var(--border);
  border-radius:24px;
  background:var(--surface);
  box-shadow:var(--shadow);
  overflow:hidden;
}

.card-media{
  position:relative;
  padding:16px;
}

.card-media img{
  display:block;
  width:100%;
  height:auto;
  border-radius:18px;
  background:var(--surface-strong);
}

.favorite-button{
  position:absolute;
  top:28px;
  right:28px;
  min-width:76px;
  min-height:38px;
  padding:8px 12px;
  border:1px solid rgba(102,77,13,.18);
  border-radius:999px;
  background:rgba(255,250,232,.92);
  color:var(--accent-strong);
  cursor:pointer;
}

.favorite-button.is-active{
  background:#fff0b0;
  border-color:#e2b13e;
  color:#7b5200;
}

.card-body{
  display:flex;
  flex:1;
  flex-direction:column;
  gap:14px;
  min-width:0;
  padding:16px 16px 16px 0;
}

.name{
  margin:0;
  font-size:1.25rem;
  line-height:1.2;
}

.detail{
  display:grid;
  gap:8px;
}

.detail h3{
  margin:0;
  font-size:.8rem;
  line-height:1;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
}

.definitions{
  display:grid;
  gap:8px;
  margin:0;
  padding-left:18px;
}

.tarot-cards{
  display:grid;
  gap:8px;
  margin:0;
  padding-left:18px;
}

.definitions li,
.tarot-cards li,
.example,
.reddit-example{
  margin:0;
  line-height:1.55;
  color:#433824;
}

.reddit-link{
  color:var(--accent-strong);
  font-weight:600;
  text-decoration:none;
}

.reddit-link:hover{
  text-decoration:underline;
}

.links{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:10px;
  margin-top:auto;
}

.links a,
.copy-button{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:46px;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:14px;
  background:#f8f2de;
  color:#3f331f;
  font-weight:600;
  text-decoration:none;
  cursor:pointer;
}

.copy-button.is-copied{
  background:#e7f2dd;
  border-color:#9eb47f;
}

.visually-hidden{
  position:absolute;
  width:1px;
  height:1px;
  padding:0;
  margin:-1px;
  overflow:hidden;
  clip:rect(0,0,0,0);
  white-space:nowrap;
  border:0;
}

@media (max-width:760px){
  .page{padding:20px 16px 36px}
  .toolbar{grid-template-columns:1fr}
  .card{grid-template-columns:1fr}
  .card-body{padding:0 16px 16px}
  .links{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="page">
  <header class="hero">
    <div>
      <h1>moods</h1>
      <p>Search moods, read definitions and examples, and keep favorites on this device.</p>
    </div>
    <div class="toolbar">
      <label class="search-field">
        <span class="visually-hidden">Search moods</span>
        <input id="search-input" type="search" placeholder="Search names, definitions, or examples" autocomplete="off">
      </label>
      <label class="favorite-toggle">
        <input id="favorites-only" type="checkbox">
        <span>Favorites only</span>
      </label>
    </div>
    <div class="summary-bar">
      <div id="results-summary" class="summary-text">Loading moods...</div>
      <button id="clear-search" class="ghost-button" type="button" hidden>Clear search</button>
    </div>
  </header>

  <main>
    <div id="error-message" class="message error" hidden></div>
    <div id="empty-state" class="message" hidden>No moods match the current filters.</div>
    <div id="grid" class="grid" hidden></div>
  </main>
</div>

<template id="card-template">
  <article class="card">
    <div class="card-media">
      <img loading="lazy" decoding="async">
      <button class="favorite-button" type="button">Save</button>
    </div>
    <div class="card-body">
      <h2 class="name"></h2>
      <section class="detail definitions-section" hidden>
        <h3>Definitions</h3>
        <ul class="definitions"></ul>
      </section>
      <section class="detail example-section" hidden>
        <h3>Example</h3>
        <p class="example"></p>
      </section>
      <section class="detail reddit-example-section" hidden>
        <h3>Reddit Example</h3>
        <p class="reddit-example"></p>
        <a class="reddit-link" href="" target="_blank" rel="noreferrer noopener">Source</a>
      </section>
      <section class="detail tarot-section" hidden>
        <h3>Tarot Cards</h3>
        <ul class="tarot-cards"></ul>
      </section>
      <div class="links">
        <button class="copy-button" type="button">Copy</button>
        <a class="svg-link">svg</a>
        <a class="png-link">png</a>
      </div>
    </div>
  </article>
</template>

<script>
const FAVORITES_STORAGE_KEY = "moods:favorites";

const state = {
  items: [],
  query: "",
  favoritesOnly: false,
  favorites: loadFavorites()
};

const searchInput = document.getElementById("search-input");
const favoritesOnlyInput = document.getElementById("favorites-only");
const clearSearchButton = document.getElementById("clear-search");
const resultsSummary = document.getElementById("results-summary");
const errorMessage = document.getElementById("error-message");
const emptyState = document.getElementById("empty-state");
const grid = document.getElementById("grid");
const cardTemplate = document.getElementById("card-template");

function decodeYamlScalar(value) {
  const trimmed = value.trim();

  if (!trimmed) {
    return "";
  }

  if (trimmed === "null") {
    return null;
  }

  if (trimmed.startsWith('"') && trimmed.endsWith('"')) {
    return trimmed.slice(1, -1).replace(/\\"/g, '"').replace(/\\n/g, "\n");
  }

  if (trimmed.startsWith("'") && trimmed.endsWith("'")) {
    return trimmed.slice(1, -1).replace(/''/g, "'");
  }

  return trimmed;
}

function parseCatalogYaml(source) {
  const catalog = { title: "", asset_base: "", items: [] };
  const lines = source.replace(/\r\n?/g, "\n").split("\n");
  let currentItem = null;
  let currentListKey = null;

  for (const rawLine of lines) {
    const line = rawLine.replace(/\t/g, "  ");
    const trimmed = line.trim();

    if (!trimmed || trimmed.startsWith("#")) {
      continue;
    }

    const indent = line.length - line.trimStart().length;

    if (indent === 0) {
      currentListKey = null;

      if (trimmed === "items:") {
        continue;
      }

      const topLevelMatch = trimmed.match(/^([a-zA-Z0-9_]+):\s*(.*)$/);

      if (topLevelMatch) {
        catalog[topLevelMatch[1]] = decodeYamlScalar(topLevelMatch[2]);
      }

      continue;
    }

    if (indent === 2 && trimmed.startsWith("- id:")) {
      currentItem = { id: decodeYamlScalar(trimmed.slice(5)) };
      catalog.items.push(currentItem);
      currentListKey = null;
      continue;
    }

    if (indent === 2 && trimmed.startsWith("- ")) {
      currentItem = { id: decodeYamlScalar(trimmed.slice(2)) };
      catalog.items.push(currentItem);
      currentListKey = null;
      continue;
    }

    if (!currentItem) {
      continue;
    }

    if (indent === 4 && trimmed.endsWith(":")) {
      const listKey = trimmed.slice(0, -1);

      if (listKey === "definitions" || listKey === "tarot_cards") {
        currentItem[listKey] = [];
        currentListKey = listKey;
        continue;
      }
    }

    if (indent === 4) {
      currentListKey = null;
      const fieldMatch = trimmed.match(/^([a-zA-Z0-9_]+):\s*(.*)$/);

      if (fieldMatch) {
        currentItem[fieldMatch[1]] = decodeYamlScalar(fieldMatch[2]);
      }

      continue;
    }

    if (indent === 6 && trimmed.startsWith("- ")) {
      if (currentListKey === "definitions" || currentListKey === "tarot_cards") {
        currentItem[currentListKey].push(decodeYamlScalar(trimmed.slice(2)));
      }
    }
  }

  return catalog;
}

function humanizeMoodId(id) {
  return id.replace(/^mood_/, "").replace(/_/g, " ");
}

function titleCase(text) {
  return text.replace(/\b[a-z]/g, function (match) {
    return match.toUpperCase();
  });
}

function normalizeMood(item) {
  const plainName = humanizeMoodId(item.id || "");
  const definitions = Array.isArray(item.definitions) ? item.definitions.filter(Boolean) : [];
  const tarotCards = Array.isArray(item.tarot_cards) ? item.tarot_cards.filter(Boolean) : [];
  const example = typeof item.example === "string" ? item.example.trim() : "";
  const redditExample = typeof item.reddit_example === "string" ? item.reddit_example.trim() : "";
  const redditExampleUrl = typeof item.reddit_example_url === "string" ? item.reddit_example_url.trim() : "";

  return {
    id: item.id,
    plainName,
    displayName: titleCase(plainName),
    definitions,
    tarotCards,
    example,
    redditExample,
    redditExampleUrl,
    pngHref: "png/" + item.id + ".png",
    svgHref: "svg/" + item.id + ".svg",
    searchText: [item.id, plainName, definitions.join(" "), tarotCards.join(" "), example, redditExample].join(" ").toLowerCase()
  };
}

function loadFavorites() {
  try {
    const rawValue = window.localStorage.getItem(FAVORITES_STORAGE_KEY);
    const parsed = JSON.parse(rawValue || "[]");
    return new Set(Array.isArray(parsed) ? parsed.filter(function (value) {
      return typeof value === "string";
    }) : []);
  } catch (error) {
    return new Set();
  }
}

function saveFavorites() {
  try {
    window.localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify(Array.from(state.favorites)));
  } catch (error) {
    // Ignore storage failures so the page still works in restrictive browsers.
  }
}

async function copyMoodName(name, button) {
  const originalText = button.dataset.label || button.textContent;

  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(name);
    } else {
      const fallbackField = document.createElement("textarea");
      fallbackField.value = name;
      fallbackField.setAttribute("readonly", "");
      fallbackField.style.position = "fixed";
      fallbackField.style.opacity = "0";
      fallbackField.style.pointerEvents = "none";
      document.body.appendChild(fallbackField);
      fallbackField.select();
      document.execCommand("copy");
      fallbackField.remove();
    }

    button.textContent = "Copied";
    button.classList.add("is-copied");
  } catch (error) {
    button.textContent = "Copy failed";
    button.classList.remove("is-copied");
  }

  window.clearTimeout(button._copyResetTimer);
  button._copyResetTimer = window.setTimeout(function () {
    button.textContent = originalText;
    button.classList.remove("is-copied");
  }, 1200);
}

function filterItems() {
  const normalizedQuery = state.query.trim().toLowerCase();

  return state.items.filter(function (item) {
    if (state.favoritesOnly && !state.favorites.has(item.id)) {
      return false;
    }

    if (!normalizedQuery) {
      return true;
    }

    return item.searchText.includes(normalizedQuery);
  });
}

function updateSummary(filteredCount) {
  const totalCount = state.items.length;
  const savedCount = state.favorites.size;
  let summary = filteredCount === totalCount ? totalCount + " moods" : filteredCount + " of " + totalCount + " moods";

  if (state.favoritesOnly) {
    summary += " | favorites only";
  }

  if (savedCount) {
    summary += " | " + savedCount + " saved";
  }

  resultsSummary.textContent = summary;
}

function buildCard(item) {
  const card = cardTemplate.content.firstElementChild.cloneNode(true);
  const image = card.querySelector("img");
  const favoriteButton = card.querySelector(".favorite-button");
  const name = card.querySelector(".name");
  const definitionsSection = card.querySelector(".definitions-section");
  const definitionsList = card.querySelector(".definitions");
  const exampleSection = card.querySelector(".example-section");
  const example = card.querySelector(".example");
  const redditExampleSection = card.querySelector(".reddit-example-section");
  const redditExample = card.querySelector(".reddit-example");
  const redditLink = card.querySelector(".reddit-link");
  const tarotSection = card.querySelector(".tarot-section");
  const tarotCardsList = card.querySelector(".tarot-cards");
  const copyButton = card.querySelector(".copy-button");
  const svgLink = card.querySelector(".svg-link");
  const pngLink = card.querySelector(".png-link");
  const isFavorite = state.favorites.has(item.id);

  image.src = item.pngHref;
  image.alt = item.displayName;

  name.textContent = item.displayName;

  favoriteButton.textContent = isFavorite ? "Saved" : "Save";
  favoriteButton.classList.toggle("is-active", isFavorite);
  favoriteButton.setAttribute("aria-pressed", isFavorite ? "true" : "false");
  favoriteButton.setAttribute("aria-label", (isFavorite ? "Remove " : "Save ") + item.plainName + " as favorite");
  favoriteButton.addEventListener("click", function () {
    if (state.favorites.has(item.id)) {
      state.favorites.delete(item.id);
    } else {
      state.favorites.add(item.id);
    }

    saveFavorites();
    render();
  });

  if (item.definitions.length) {
    const definitionsFragment = document.createDocumentFragment();

    item.definitions.forEach(function (definition) {
      const listItem = document.createElement("li");
      listItem.textContent = definition;
      definitionsFragment.appendChild(listItem);
    });

    definitionsList.appendChild(definitionsFragment);
    definitionsSection.hidden = false;
  }

  if (item.example) {
    example.textContent = item.example;
    exampleSection.hidden = false;
  }

  if (item.redditExample) {
    redditExample.textContent = item.redditExample;
    redditLink.href = item.redditExampleUrl || "#";
    redditLink.hidden = !item.redditExampleUrl;
    redditExampleSection.hidden = false;
  }

  if (item.tarotCards.length) {
    const tarotFragment = document.createDocumentFragment();

    item.tarotCards.forEach(function (entry) {
      const listItem = document.createElement("li");
      listItem.textContent = entry;
      tarotFragment.appendChild(listItem);
    });

    tarotCardsList.appendChild(tarotFragment);
    tarotSection.hidden = false;
  }

  copyButton.dataset.label = "Copy";
  copyButton.addEventListener("click", function () {
    copyMoodName(item.plainName, copyButton);
  });

  svgLink.href = item.svgHref;
  svgLink.textContent = "svg";
  pngLink.href = item.pngHref;
  pngLink.textContent = "png";

  return card;
}

function render() {
  const filteredItems = filterItems();
  const fragment = document.createDocumentFragment();

  filteredItems.forEach(function (item) {
    fragment.appendChild(buildCard(item));
  });

  grid.replaceChildren(fragment);
  grid.hidden = filteredItems.length === 0;
  emptyState.hidden = filteredItems.length !== 0;
  clearSearchButton.hidden = !state.query;
  updateSummary(filteredItems.length);
}

function showError(message) {
  errorMessage.textContent = message;
  errorMessage.hidden = false;
  grid.hidden = true;
  emptyState.hidden = true;
  resultsSummary.textContent = "Could not load moods";
}

async function loadCatalog() {
  try {
    const response = await fetch("data/catalog.yaml", { cache: "no-store" });

    if (!response.ok) {
      throw new Error("Request failed with status " + response.status);
    }

    const source = await response.text();
    const catalog = parseCatalogYaml(source);
    state.items = catalog.items.map(normalizeMood).filter(function (item) {
      return Boolean(item.id);
    });

    render();
  } catch (error) {
    showError("Catalog failed to load. Check data/catalog.yaml and refresh.");
  }
}

searchInput.addEventListener("input", function (event) {
  state.query = event.target.value;
  render();
});

favoritesOnlyInput.addEventListener("change", function (event) {
  state.favoritesOnly = event.target.checked;
  render();
});

clearSearchButton.addEventListener("click", function () {
  state.query = "";
  searchInput.value = "";
  render();
  searchInput.focus();
});

favoritesOnlyInput.checked = state.favoritesOnly;
loadCatalog();
</script>
</body>
</html>
